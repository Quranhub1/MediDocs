services:
  - type: web
    name: zenith-assets
    env: node
    buildCommand: npm install && npm run build
    publishDir: build
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: REACT_APP_BASE_URL
        value: "https://zenith-assets.onrender.com"
